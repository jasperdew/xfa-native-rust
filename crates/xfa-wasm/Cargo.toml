[package]
name = "xfa-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "WASM bindings for XFA form processing — parse, extract, and convert XFA PDFs in the browser"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
xfa-dom-resolver.workspace = true
formcalc-interpreter.workspace = true
xfa-layout-engine.workspace = true
xfa-json.workspace = true
pdf-syntax.workspace = true
pdf-sign.workspace = true
pdf-compliance.workspace = true
pdf-render = { path = "../pdf-render", optional = true }
pdf-annot = { path = "../pdf-annot", optional = true }
lopdf = { workspace = true, optional = true }
wasm-bindgen = "0.2"
serde.workspace = true
serde_json.workspace = true
indexmap.workspace = true
js-sys = "0.3"

[features]
default = ["render", "annotate"]
render = ["dep:pdf-render"]
annotate = ["dep:pdf-annot", "dep:lopdf"]

[dev-dependencies]
wasm-bindgen-test = "0.3"
