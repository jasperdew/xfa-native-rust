<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XFA PDF Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Tab bar -->
  <div id="tab-bar">
    <div id="tabs"></div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-group">
      <button id="btn-open" title="Open (Ctrl+O)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1"/>
          <path d="M20 13H8l-3 7h12l3-7z"/>
        </svg>
      </button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-prev" title="Previous Page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span id="page-indicator">
        <input type="text" id="page-input" value="1" />
        <span>/ <span id="page-total">0</span></span>
      </span>
      <button id="btn-next" title="Next Page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-zoom-out" title="Zoom Out (Ctrl+-)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="8" y1="11" x2="14" y2="11"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <select id="zoom-select">
        <option value="fit-width">Fit Width</option>
        <option value="fit-page">Fit Page</option>
        <option value="50">50%</option>
        <option value="75">75%</option>
        <option value="100" selected>100%</option>
        <option value="125">125%</option>
        <option value="150">150%</option>
        <option value="200">200%</option>
        <option value="300">300%</option>
      </select>
      <button id="btn-zoom-in" title="Zoom In (Ctrl+=)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main content -->
  <div id="main">
    <!-- Sidebar (thumbnails / bookmarks) -->
    <div id="sidebar">
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-panel="thumbnails">Pages</button>
        <button class="sidebar-tab" data-panel="bookmarks">Bookmarks</button>
      </div>
      <div id="thumbnail-panel" class="sidebar-panel active"></div>
      <div id="bookmark-panel" class="sidebar-panel"></div>
    </div>
    <div id="sidebar-resizer"></div>

    <!-- PDF viewport -->
    <div id="viewport">
      <!-- Search bar (hidden by default) -->
      <div id="search-bar" class="hidden">
        <input type="text" id="search-input" placeholder="Find in document..." />
        <span id="search-results">0 / 0</span>
        <button id="search-prev" title="Previous">&#9650;</button>
        <button id="search-next" title="Next">&#9660;</button>
        <button id="search-close" title="Close">&times;</button>
      </div>
      <div id="viewport-scroll">
        <div id="page-container"></div>
      </div>
      <!-- Empty state -->
      <div id="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <p>Open a PDF file to get started</p>
        <p class="hint">Ctrl+O or drag and drop</p>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
