name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown -p xfa-wasm

  corpus-regression:
    name: Corpus Regression Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build test runner
        run: cargo build --release -p xfa-test-runner
      - name: Run corpus subset
        run: |
          if [[ -d tests/corpus-subset/ ]] && [[ $(find tests/corpus-subset/ -name '*.pdf' 2>/dev/null | wc -l) -gt 0 ]]; then
            ./target/release/xfa-test-runner run \
              --corpus tests/corpus-subset/ \
              --db /tmp/results.sqlite \
              --workers 2 \
              --timeout 10 \
              --no-verapdf
            PANICS=$(sqlite3 /tmp/results.sqlite \
              "SELECT COUNT(*) FROM test_results WHERE status='crash'")
            echo "Panics detected: $PANICS"
            if [ "$PANICS" -gt 0 ]; then
              echo "REGRESSION: $PANICS panics detected in corpus subset"
              ./target/release/xfa-test-runner clusters --db /tmp/results.sqlite
              exit 1
            fi
            echo "PASS: zero panics in corpus subset"
          else
            echo "No corpus-subset PDFs found, skipping"
          fi

  corpus-smoke:
    name: Corpus Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build accuracy-report
        run: cargo build --release --bin accuracy-report
      - name: Run accuracy report on corpus subset
        run: |
          if [[ -d corpus/ ]] && [[ $(ls corpus/*.pdf 2>/dev/null | wc -l) -gt 0 ]]; then
            mkdir -p reports/accuracy
            cargo run --release --bin accuracy-report -- \
              --corpus corpus \
              --output reports/accuracy/report.json
            PARSE_RATE=$(python3 -c "import json; print(json.load(open('reports/accuracy/report.json'))['parse_rate_pct'])")
            echo "Parse rate: ${PARSE_RATE}%"
            if python3 -c "import sys; sys.exit(0 if float(sys.argv[1]) >= 95.0 else 1)" "${PARSE_RATE}"; then
              echo "PASS: Parse rate ${PARSE_RATE}% meets threshold"
            else
              echo "FAIL: Parse rate ${PARSE_RATE}% is below 95% threshold"
              exit 1
            fi
          else
            echo "No corpus PDFs found, skipping"
          fi
