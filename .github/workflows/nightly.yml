name: Nightly Corpus Test

on:
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  full-corpus-test:
    name: Full Corpus Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --release --workspace

      - name: Run all tests
        run: cargo test --release --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run corpus tests (extended matrix)
        run: |
          if [[ -d corpus/ ]] && [[ $(find corpus/ -name '*.pdf' 2>/dev/null | head -1) ]]; then
            ./target/release/xfa-test-runner run \
              --corpus corpus/ \
              --db /tmp/nightly-results.sqlite \
              --workers 2 \
              --timeout 15 \
              --tier full \
              --no-verapdf

            # Check for crashes.
            CRASHES=$(sqlite3 /tmp/nightly-results.sqlite \
              "SELECT COUNT(*) FROM test_results WHERE status='crash'" 2>/dev/null || echo "0")
            echo "Crashes: ${CRASHES}"
            if [ "${CRASHES}" -gt 0 ]; then
              echo "REGRESSION: ${CRASHES} crashes detected"
              ./target/release/xfa-test-runner clusters --db /tmp/nightly-results.sqlite || true
              exit 1
            fi

            # Report pass rate.
            TOTAL=$(sqlite3 /tmp/nightly-results.sqlite \
              "SELECT COUNT(*) FROM test_results")
            PASS=$(sqlite3 /tmp/nightly-results.sqlite \
              "SELECT COUNT(*) FROM test_results WHERE status='pass'")
            echo "Pass rate: ${PASS}/${TOTAL}"
          else
            echo "No corpus PDFs found, skipping"
          fi

      - name: Upload corpus results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-corpus-results
          path: /tmp/nightly-results.sqlite
          retention-days: 90
          if-no-files-found: ignore

      - name: Run accuracy report
        run: |
          if [[ -d corpus/ ]] && [[ $(ls corpus/*.pdf 2>/dev/null | wc -l) -gt 0 ]]; then
            mkdir -p reports/accuracy
            cargo run --release --bin accuracy-report -- \
              --corpus corpus \
              --output reports/accuracy/report.json \
              --html
          else
            echo "No corpus PDFs found, skipping accuracy report"
          fi

      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-accuracy-report
          path: reports/accuracy/
          retention-days: 90
          if-no-files-found: ignore

  benchmarks:
    name: Nightly Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Restore baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: bench-nightly-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            bench-nightly-${{ runner.os }}-

      - name: Run benchmarks
        run: |
          cargo bench --package pdf-bench 2>&1 | tee reports/bench-results.txt || true

      - name: Check for regressions
        run: |
          if grep -q "regressed" reports/bench-results.txt 2>/dev/null; then
            echo "WARNING: benchmark regressions detected"
            grep -A2 "regressed" reports/bench-results.txt
          else
            echo "No benchmark regressions"
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-results
          path: |
            reports/bench-results.txt
            target/criterion/
          retention-days: 90
          if-no-files-found: ignore

  desktop-tests:
    name: Nightly Desktop Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Backend tests
        run: cargo test --package pdf-desktop

      - name: Frontend tests
        run: |
          cd crates/pdf-desktop
          npm install
          npx vitest run

  conversion-tests:
    name: Nightly Conversion Quality Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run conversion tests
        run: |
          cargo test --package pdf-docx
          cargo test --package pdf-xlsx
          cargo test --package pdf-pptx

  conformance:
    name: Nightly Conformance (veraPDF)
    runs-on: ubuntu-latest
    if: false  # Enable when veraPDF is installed and gold masters are available
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache veraPDF
        uses: actions/cache@v4
        with:
          path: /opt/verapdf
          key: verapdf-nightly

      - name: Run veraPDF
        run: ./scripts/run-verapdf.sh --profile 2b --output reports/verapdf --ci corpus/

      - name: Generate report
        if: always()
        run: ./scripts/verapdf-report.sh

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-verapdf-report
          path: reports/verapdf/
          retention-days: 90

  visual-regression:
    name: Nightly AVRT
    runs-on: ubuntu-latest
    if: false  # Enable when gold masters are available
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run AVRT
        run: ./scripts/run-avrt.sh --ci

      - name: Generate report
        if: always()
        run: ./scripts/avrt-report.sh

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-avrt-report
          path: reports/avrt/
          retention-days: 90
